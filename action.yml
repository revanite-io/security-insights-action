---
name: Validate Security Insights
description: Validate a security-insights.yml file against the official OSSF Security Insights CUE schema

inputs:
  file:
    description: Path to the security-insights.yml file
    required: false
    default: .github/security-insights.yml

runs:
  using: composite
  steps:
    - uses: cue-lang/setup-cue@v1.0.1
    - name: Extract schema version
      id: version
      shell: bash
      run: |
        VERSION=$(yq '.header.schema-version' "${{ inputs.file }}")
        echo "schema-version=$VERSION" >> "$GITHUB_OUTPUT"
    - name: Download schema
      shell: bash
      run: |
        VERSION="${{ steps.version.outputs.schema-version }}"
        BASE="https://raw.githubusercontent.com/ossf/security-insights/v${VERSION}"
        if ! curl -fsSL "${BASE}/spec/schema.cue" -o schema.cue 2>/dev/null; then
          curl -fsSL "${BASE}/schema.cue" -o schema.cue
        fi
    - name: Validate
      shell: bash
      run: |
        if grep -q '^#SecurityInsights:' schema.cue; then
          cue vet -d '#SecurityInsights' schema.cue "${{ inputs.file }}"
        else
          cue vet schema.cue "${{ inputs.file }}"
        fi
